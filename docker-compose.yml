services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-markdowntopdf}/${IMAGE_NAME:-markdown-pdf-home}:${IMAGE_TAG:-latest}
    container_name: markdown-pdf-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s