name: Deploy to Server

on:
  push:
    branches:
      - main

env:
  SERVER_APP_DIR: /home/luya/markdown-pdf-home
  REPO_NAME: ${{ github.event.repository.name }}
  REPO_OWNER: ${{ github.repository_owner }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # ==================== CI ====================
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test || echo "No tests configured"

  # ==================== Deploy ====================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 60
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Git Tag
        id: tag
        run: |
          TAG=$(date +'%Y.%m.%d.%H%M%S')
          echo "version=$TAG" >> $GITHUB_OUTPUT
          git tag v$TAG
          git push origin v$TAG

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
          tags: |
            type=sha,format=short
            type=raw,value=${{ steps.tag.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          command_timeout: 10m
          envs: GITHUB_TOKEN,REPO_OWNER,REPO_NAME
          script: |
            set -e
            IMAGE="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ steps.tag.outputs.version }}"

            echo "Logging in to ghcr.io..."
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$REPO_OWNER" --password-stdin

            echo "Pulling image: $IMAGE"
            docker pull "$IMAGE"

            echo "Stopping old container..."
            docker stop markdown-pdf-app || true
            docker rm markdown-pdf-app || true

            echo "Starting new container..."
            docker run -d \
              --name markdown-pdf-app \
              -p 3000:3000 \
              --restart unless-stopped \
              "$IMAGE"

            echo "Cleaning up old images..."
            docker image prune -f

            echo "Deployed: $IMAGE"
            docker ps | grep markdown-pdf

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.tag.outputs.version }}
          name: Release v${{ steps.tag.outputs.version }}
          draft: false
          generate_release_notes: true
