name: Deploy to Server

on:
  push:
    branches:
      - main

env:
  SERVER_APP_DIR: /opt/markdown-pdf
  REPO_NAME: ${{ github.event.repository.name }}
  REPO_OWNER: ${{ github.repository_owner }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # ==================== CI ====================
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test || echo "No tests configured"

  # ==================== Deploy ====================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read

    steps:
      - name: Create Git Tag
        id: tag
        run: |
          TAG=$(date +'%Y.%m.%d.%H%M%S')
          echo "version=$TAG" >> $GITHUB_OUTPUT
          git tag v$TAG
          git push origin v$TAG

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          timeout: 10m
          envs: SERVER_APP_DIR,REPO_NAME,REPO_OWNER,GITHUB_TOKEN
          script: |
            set -e
            VERSION=${{ steps.tag.outputs.version }}
            cd ${{ env.SERVER_APP_DIR }}

            echo "Deploying version: $VERSION"

            # 下载指定版本源码
            echo "Downloading source..."
            curl -L \
              -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/tarball/v$VERSION" \
              -o source.tar.gz

            # 解压到 source 目录
            rm -rf source && mkdir -p source
            tar -xzf source.tar.gz -C source --strip-components=1
            rm source.tar.gz

            # 构建 Docker 镜像
            cd source
            echo "Building Docker image..."
            docker build -t markdown-pdf:$VERSION .
            docker tag markdown-pdf:$VERSION markdown-pdf:latest

            # 停止旧容器
            docker stop markdown-pdf-app || true
            docker rm markdown-pdf-app || true

            # 运行新容器
            docker run -d \
              --name markdown-pdf-app \
              -p 3000:3000 \
              --restart unless-stopped \
              markdown-pdf:latest

            echo "Deployed: $VERSION"
            docker ps | grep markdown-pdf

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.tag.outputs.version }}
          name: Release v${{ steps.tag.outputs.version }}
          draft: false
          generate_release_notes: true
