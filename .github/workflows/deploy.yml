name: Deploy to Server

on:
  push:
    branches:
      - master
      - main

env:
  REGISTRY: ghcr.io
  # Derive the image namespace from the actual repository owner so that the
  # default GITHUB_TOKEN (which is scoped to the repo's installation) is
  # authorized to push. Pushing to a foreign namespace such as
  # ghcr.io/<other-user>/<repo> fails with:
  #   permission_denied: The requested installation does not exist
  DOCKER_IMAGE: ghcr.io/${{ lower(github.repository_owner) }}/home
  SERVER_APP_DIR: /opt/markdown-pdf

jobs:
  # ==================== CI ====================
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test || echo "No tests configured"

  # ==================== Build & Deploy ====================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push'
    permissions:
      packages: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract metadata
        id: meta
        run: |
          TAG=$(date +'%Y.%m.%d.%H%M%S')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Git Tag
        uses: actions/github-script@v7
        with:
          script: |
            const { data: ref } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'refs/heads/master'
            });

            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'refs/tags/v${{ steps.meta.outputs.tag }}',
              sha: ref.object.sha
            });

            // Also update master tag
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'refs/tags/v${{ steps.meta.outputs.version }}',
              sha: ref.object.sha
            });

      - name: Create Release
        uses: actions/create-release@v1
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.meta.outputs.tag }}
          release_name: Release v${{ steps.meta.outputs.tag }}
          draft: false
          prerelease: false

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd ${{ env.SERVER_APP_DIR }}

            # Pull latest code
            git pull origin main

            # Pull new Docker image
            docker pull ${{ env.DOCKER_IMAGE }}:${{ steps.meta.outputs.tag }}

            # Stop old container
            docker compose down || true

            # Update image tag in compose file
            sed -i 's|image:.*|image: ${{ env.DOCKER_IMAGE }}:${{ steps.meta.outputs.tag }}|' docker-compose.yml || true

            # Start with new image
            docker compose up -d

            # Cleanup old images
            docker image prune -f

            # Show status
            docker compose ps

  # ==================== Create Git Tag Only (for other branches) ====================
  tag-only:
    name: Create Tag
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract metadata
        id: meta
        run: |
          TAG=$(date +'%Y.%m.%d.%H%M%S')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
